name: Bug report / support request
description: Report a bug or request technical help for Backseat Battle.
title: "[Support] "
labels:
  - support
body:
  - type: dropdown
    id: language
    attributes:
      label: Preferred language
      description: Choose the language you want us to reply in.
      options:
        - English
        - Danish
    validations:
      required: true
  - type: input
    id: app_version
    attributes:
      label: App version
      description: Example: 1.0
      placeholder: "1.0"
    validations:
      required: true
  - type: input
    id: ios_version
    attributes:
      label: iOS version
      placeholder: "iOS 18.4"
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device
      placeholder: "iPhone 15 Pro"
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the issue in one or two sentences.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: List exact steps so we can reproduce the issue.
      placeholder: |
        1. Open the app
        2. Start a lobby
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: Extra notes
      description: Logs, screenshots, or any extra context.
    validations:
      required: false
  - type: checkboxes
    id: checklist
    attributes:
      label: Confirmation
      options:
        - label: I have included app version, iOS version, and device.
          required: true
